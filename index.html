<!DOCTYPE html>
<html lang="vi">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng Nhập</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.login-box{
    width:350px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:25px;
    padding:35px 30px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
    animation:fade 1s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.login-box h1{
    color:white;
    margin-bottom:30px;
    letter-spacing:3px;
    font-size:32px;
}

.input-box{
    position:relative;
    margin:20px 0;
}

.input-box input{
    width:100%;
    padding:14px 15px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:15px;
    background:rgba(255,255,255,0.85);
    transition:0.3s;
}

.input-box input:focus{
    transform:scale(1.03);
    box-shadow:0 0 10px rgba(255,255,255,0.6);
}

/* Ô ngày tháng năm */

.input-box input[type="date"]{
    color:#666;
}

.input-box input[type="date"]:before{
    content:"NGÀY / THÁNG / NĂM";
    color:#777;
    position:absolute;
    left:15px;
}

.input-box input[type="date"]:focus:before,
.input-box input[type="date"]:valid:before{
    display:none;
}

.note{
    margin-top:10px;
    color:white;
    font-size:13px;
    line-height:1.5;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:white;
    color:#0099ff;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0099ff;
    color:white;
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.footer{
    margin-top:18px;
    color:white;
    font-size:13px;
}

</style>
</head>

<body>

<div class="login-box">

    <h1>ĐĂNG NHẬP</h1>

    <div class="input-box">
        <input type="text" placeholder="HỌ TÊN">
    </div>

    <div class="input-box">
        <input type="date" min="2011-01-01" max="2012-12-31" required>
    </div>

    <div class="note">
        Lưu ý: Hãy chọn đúng ngày sinh và ghi đúng họ tên <h4>[Nếu không sẽ không ĐANG NHẬP được]</h4>
    </div>

    <button>Đăng nhập</button>

    <div class="footer">

const dateInput = document.querySelector('input[type="date"]');

// CHUYỂN THÀNH CHỮ THƯỜNG KHÔNG DẤU
nameInput.addEventListener('input', function () {

    let value = this.value.toLowerCase();

    value = value.normalize("NFD")
                 .replace(/[\u0300-\u036f]/g, "");

    value = value.replace(/đ/g, "d");

    value = value.replace(/[^a-z]/g, "");

    this.value = value;
});
