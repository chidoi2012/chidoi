<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi Đội</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#eef2ff;
font-family:Arial;
}

.khung{
width:360px;
height:640px;
border:6px solid black;
border-radius:30px;
background:white;
position:relative;
}

.title{
position:absolute;
right:10px;
top:120px;
writing-mode: vertical-rl;
font-size:38px;
font-weight:bold;
}

.menu{
position:absolute;
top:150px;
left:70px;
}

.nut{
width:180px;
padding:15px;
margin:20px 0;
border:4px solid black;
border-radius:12px;
font-size:20px;
font-weight:bold;
background:#f5f5f5;
cursor:pointer;
}

.nut:hover{
background:#dbeafe;
}

</style>
</head>

<body>

<div class="khung">

<div class="title">CHI ĐỘI</div>

<div class="menu">

<button class="nut" onclick="alert('KHÁC')">KHÁC</button>

<button class="nut" onclick="alert('GAME')">GAME</button>

<button class="nut" onclick="alert('QUÊ QUÁN')">QUÊ QUÁN</button>

<button class="nut" onclick="alert('SĐT')">SĐT</button>

</div>

</div>

</body>
</html>
