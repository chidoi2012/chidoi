<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi Đội 8A</title>

<style>
body{
    font-family: Arial;
    background:#e8f0ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    height:650px;
    border:6px solid black;
    border-radius:30px;
    background:white;
    position:relative;
    text-align:center;
}

.title{
    position:absolute;
    right:-80px;
    top:150px;
    font-size:40px;
    font-weight:bold;
    transform:rotate(90deg);
}

.menu{
    margin-top:150px;
}

.btn{
    width:180px;
    padding:18px;
    margin:20px auto;
    border:4px solid black;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    background:#f5f5f5;
}

.btn:hover{
    background:#d6e4ff;
}
</style>
</head>

<body>

<div class="container">

<div class="title">CHI ĐỘI 8A</div>

<div class="menu">
<button class="btn" onclick="alert('Trang khác')">KHÁC</button>
<button class="btn" onclick="alert('Trang game')">GAME</button>
<button class="btn" onclick="alert('Quê quán')">QUÊ QUÁN</button>
<button class="btn" onclick="alert('Số điện thoại')">SĐT</button>
</div>

</div>

</body>
</html>
