<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang Chủ</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden; /* Chống cuộn ngang khi menu mở */
    }

    /* --- NÚT MENU BA GẠCH --- */
    .menu-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 45px;
        height: 45px;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        z-index: 100; /* Nằm trên cùng */
    }

    .menu-btn span {
        display: block;
        width: 25px;
        height: 3px;
        background: white;
        border-radius: 2px;
        transition: 0.3s;
    }

    /* --- SIDEBAR (BẢNG MENU TRƯỢT) --- */
    .sidebar {
        position: fixed;
        top: 0;
        left: -250px; /* Ẩn đi mặc định */
        width: 250px;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        transition: 0.4s ease;
        z-index: 99;
        padding-top: 80px;
    }

    .sidebar.active {
        left: 0; /* Đẩy ra khi có class active */
    }

    .sidebar a {
        display: block;
        padding: 15px 25px;
        color: #333;
        text-decoration: none;
        font-weight: 500;
        border-bottom: 1px solid rgba(0,0,0,0.05);
        transition: 0.3s;
    }

    .sidebar a:hover {
        background: #4facfe;
        color: white;
    }

    /* --- LỚP PHỦ MỜ KHI MỞ MENU --- */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.3);
        display: none;
        z-index: 98;
    }

    .overlay.active {
        display: block;
    }

    /* --- NỘI DUNG CHÍNH --- */
    .container {
        width: 90%;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 25px;
        padding: 25px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        color: white;
        text-align: center;
    }

    .title { font-size: 30px; font-weight: 600; margin-bottom: 25px; }
    
    .card {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        padding: 18px;
        margin-bottom: 18px;
        transition: 0.3s;
    }

    .logout-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: white;
        color: #0099ff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
    }
</style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="sidebar" id="mySidebar">
        <a href="#">🏠 Trang chủ</a>
        <a href="#">👤 Thông tin cá nhân</a>
        <a href="#">⚙️ Cài đặt</a>
        <a href="#">🔔 Thông báo</a>
        <a href="#" onclick="logout()" style="color: red;">🚪 Thoát</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <div class="title">TRANG CHỦ</div>

        <a href="hoten.html" style="text-decoration: none;">
    <div class="card">
        <h2>HỌ TÊN</h2>
    </div>
</a>

<a href="songay.html" style="text-decoration: none;">
    <div class="card">
        <h2>SỐ NGÀY</h2>
    </div>
</a>

<a href="tinhyeu.html" style="text-decoration: none;">
    <div class="card">
        <h2>TÍNH ❤️</h2>
    </div>
</a>


        <button class="logout-btn" onclick="logout()">Đăng xuất</button>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById("mySidebar");
            const overlay = document.getElementById("overlay");
            
            sidebar.classList.toggle("active");
            overlay.classList.toggle("active");
        }

        function logout() {
            alert("Đã đăng xuất!");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
